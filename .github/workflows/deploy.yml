name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish StudyAssistant.Web/StudyAssistant.Web.csproj -c Release -o publish

      - name: Fix base path for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/StudyAssistant/" />|' publish/wwwroot/index.html
          cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
